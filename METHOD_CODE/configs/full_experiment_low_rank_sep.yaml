# Full Experiment Low-Rank + Separation Config
# Recommended primary SOTA candidate.

model:
  name: "roberta-base"
  hidden_size: 768
  num_attention_heads: 12
  num_hidden_layers: 12

data:
  dataset_path: "../jigsaw-toxic-comment-classification-challenge/train.csv/train.csv"
  max_length: 128
  filter_toxic: true
  test_size: 0.1
  val_size: 0.1

fscil:
  stages:
    - name: "base"
      classes: ["obscene", "insult"]
      shots_per_class: 32
    - name: "stage1"
      classes: ["threat", "identity_hate"]
      shots_per_class: 64
    - name: "stage2"
      classes: ["severe_toxic"]
      shots_per_class: 64
  num_seeds: 5

lora:
  target_modules: ["query", "value"]
  rs: 8
  rp: 4
  alpha: 16
  dropout: 0.05

prefix:
  m: 10
  n_anchors: 5
  alpha_anchor: 0.7
  apply_to_all_layers: true

toxic_pe:
  enable: true
  q_dim: 1
  m_dim: 1
  l_dim: 1
  v_dim: 1

rejection_gate:
  theta_coarse: 0.5
  theta_fine: 0.3
  learnable_weights: false
  a: 1.0
  b: 1.0
  c: 1.0
  d: 1.0

replay:
  mask_new_class_labels: false
  coreset_size_per_class: 64
  new_class_negative_ratio: 2.0

training:
  output_dir: "./outputs_full_low_rank_sep"
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 2
  num_train_epochs: 5
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  logging_steps: 50
  eval_strategy: "epoch"
  save_strategy: "no"           # 不保存中间 checkpoint，仅靠脚本末尾手动保存 checkpoint-best
  load_best_model_at_end: false
  metric_for_best_model: "eval_macro_f1"
  greater_is_better: true
  fp16: false
  seed: 42

loss_weights:
  lambda_evo: 0.5
  lambda_sp: 1.0e-3
  beta: 0.3
  eta: 1.0e-4
  lambda_sep: 0.0
  separation_margin: 0.15
  separation_normalize: true
  separation_apply_stages: [1]

semantic_consolidation:
  tau: 0.1
  eval_samples: 200