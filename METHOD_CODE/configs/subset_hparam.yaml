# Subset Hyperparameter Search Config — 用于快速调参
# 特点：减少 shots、减少 epochs，用少量数据快速评估超参效果
# 适用场景：grid search / random search 前筛选候选参数
# 预计单 stage 耗时：1-3 分钟

model:
  name: "roberta-base"
  hidden_size: 768
  num_attention_heads: 12
  num_hidden_layers: 12

data:
  dataset_path: "../jigsaw-toxic-comment-classification-challenge/train.csv/train.csv"
  max_length: 128
  filter_toxic: true
  test_size: 0.1
  val_size: 0.1

fscil:
  # 子集：base 8-shot，增量 4-shot
  # 注意：shots 过少时 K-means n_anchors 需同步下调
  stages:
    - name: "base"
      classes: ["obscene", "insult"]
      shots_per_class: 8
    - name: "stage1"
      classes: ["threat", "identity_hate"]
      shots_per_class: 4
    - name: "stage2"
      classes: ["severe_toxic"]
      shots_per_class: 4
  num_seeds: 1

lora:
  target_modules: ["query", "value"]
  rs: 8
  rp: 8
  alpha: 16
  dropout: 0.05

prefix:
  m: 5               # 子集下调前缀长度，防止过拟合
  n_anchors: 3       # 子集下调聚类数（必须 <= shots_per_class * num_classes）
  alpha_anchor: 0.7
  apply_to_all_layers: true

toxic_pe:
  enable: true
  q_dim: 1
  m_dim: 1
  l_dim: 1
  v_dim: 1

rejection_gate:
  theta_coarse: 0.5
  theta_fine: 0.3
  learnable_weights: false
  a: 1.0
  b: 1.0
  c: 1.0
  d: 1.0

training:
  output_dir: "./outputs_hparam"
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 2
  num_train_epochs: 3        # 子集：3 epoch 足够观察趋势
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  logging_steps: 5
  eval_strategy: "epoch"
  save_strategy: "no"
  load_best_model_at_end: false
  metric_for_best_model: "eval_macro_f1"
  greater_is_better: true
  fp16: false
  seed: 42

loss_weights:
  lambda_evo: 0.5
  lambda_sp: 1.0e-3
  beta: 0.3
  eta: 1.0e-4

semantic_consolidation:
  tau: 0.1
  eval_samples: 30           # 子集：进一步减少评估样本

# ============================================================
# 超参搜索建议（供 launch_hparam_search.py 使用）
# 以下注释定义了推荐搜索空间，实际运行需配合搜索脚本
# ============================================================
