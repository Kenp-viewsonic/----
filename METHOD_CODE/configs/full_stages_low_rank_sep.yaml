# Stage overrides for full_experiment_low_rank_sep.yaml
# Conservative separation variant: protect stage2 while lifting stage1 separation.

base:
  training:
    num_train_epochs: 5
    learning_rate: 2.0e-4
  loss_weights:
    lambda_evo: 0.5
    lambda_sp: 1.0e-3
    beta: 0.3
    eta: 1.0e-4

stage1:
  replay:
    mask_new_class_labels: false
    coreset_size_per_class: 64
    new_class_negative_ratio: 0.5
  training:
    num_train_epochs: 10
    learning_rate: 8.0e-5
  loss_weights:
    lambda_evo: 0.2
    lambda_sp: 1.0e-3
    beta: 0.2
    eta: 1.0e-4
    lambda_kd: 0.25
    kd_temperature: 2.0
    freeze_old_classifier: true
    balanced_bce: true
    balanced_bce_max_pos_weight: 2.5
    lambda_sep: 0.2
    separation_margin: 0.15
    separation_apply_stages: [1]

stage2:
  replay:
    mask_new_class_labels: false
    coreset_size_per_class: 64
    new_class_negative_ratio: 2.0
  training:
    num_train_epochs: 8
    learning_rate: 5.0e-5
  loss_weights:
    lambda_evo: 0.2
    lambda_sp: 1.0e-3
    beta: 0.2
    eta: 1.0e-4
    lambda_kd: 1.5
    kd_temperature: 2.0
    freeze_old_classifier: true
    balanced_bce: true
    balanced_bce_max_pos_weight: 3.0
    lambda_sep: 0.0