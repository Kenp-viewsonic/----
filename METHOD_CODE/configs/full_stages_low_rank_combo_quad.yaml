# Stage overrides for combo_quad: hardneg_perclass + class_margin + delayed_kd + stable_top2.

stage1:
  replay:
    mask_new_class_labels: false
    coreset_size_per_class: 64
    new_class_negative_ratio: 0.5
    confusion_negatives_enabled: true
    confusion_negatives_extra_per_class: 16
  stable_partial:
    enable: true
    unfreeze_top_layers: 2
  training:
    num_train_epochs: 10
    learning_rate: 8.0e-5
  loss_weights:
    lambda_evo: 0.2
    lambda_sp: 1.0e-3
    beta: 0.2
    eta: 1.0e-4
    lambda_kd: 0.5
    kd_temperature: 2.0
    kd_delay_ratio: 0.4
    freeze_old_classifier: true
    balanced_bce: true
    balanced_bce_max_pos_weight: 2.5
    lambda_margin: 0.2
    class_margin: 0.25
    margin_apply_stages: [1]

stage2:
  replay:
    mask_new_class_labels: false
    coreset_size_per_class: 64
    new_class_negative_ratio: 2.0
  training:
    num_train_epochs: 8
    learning_rate: 5.0e-5
  loss_weights:
    lambda_evo: 0.2
    lambda_sp: 1.0e-3
    beta: 0.2
    eta: 1.0e-4
    lambda_kd: 1.5
    kd_temperature: 2.0
    freeze_old_classifier: true
    balanced_bce: true
    balanced_bce_max_pos_weight: 3.0
