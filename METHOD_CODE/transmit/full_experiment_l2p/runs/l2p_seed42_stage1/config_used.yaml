data:
  dataset_path: ../jigsaw-toxic-comment-classification-challenge/train.csv/train.csv
  filter_toxic: true
  max_length: 128
  test_size: 0.1
  val_size: 0.1
fscil:
  num_seeds: 5
  stages:
  - classes:
    - obscene
    - insult
    name: base
    shots_per_class: 32
  - classes:
    - threat
    - identity_hate
    name: stage1
    shots_per_class: 64
  - classes:
    - severe_toxic
    name: stage2
    shots_per_class: 64
lora:
  alpha: 16
  dropout: 0.05
  rp: 8
  rs: 8
  target_modules:
  - query
  - value
loss_weights:
  beta: 0.2
  eta: 0.0001
  lambda_evo: 0.2
  lambda_sp: 0.001
model:
  hidden_size: 768
  name: roberta-base
  num_attention_heads: 12
  num_hidden_layers: 12
prefix:
  alpha_anchor: 0.7
  apply_to_all_layers: true
  m: 10
  n_anchors: 5
rejection_gate:
  a: 1.0
  b: 1.0
  c: 1.0
  d: 1.0
  learnable_weights: false
  theta_coarse: 0.5
  theta_fine: 0.3
replay:
  mask_new_class_labels: false
semantic_consolidation:
  eval_samples: 200
  tau: 0.1
toxic_pe:
  enable: true
  l_dim: 1
  m_dim: 1
  q_dim: 1
  v_dim: 1
training:
  eval_strategy: epoch
  fp16: false
  gradient_accumulation_steps: 2
  greater_is_better: true
  learning_rate: 0.0001
  load_best_model_at_end: false
  logging_steps: 50
  metric_for_best_model: eval_macro_f1
  num_train_epochs: 3
  output_dir: ./outputs_full
  per_device_eval_batch_size: 16
  per_device_train_batch_size: 8
  save_strategy: 'no'
  seed: 42
  warmup_ratio: 0.1
  weight_decay: 0.01
